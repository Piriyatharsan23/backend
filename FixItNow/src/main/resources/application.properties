# ============================================================
# FixItNow Platform - Application Configuration
# ============================================================

spring.application.name=FixItNow

# ------------------------------------------------------------
# Database - MySQL
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/fixitnow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
# validate = check schema matches entities (use update during dev, validate in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# JWT Security
# ------------------------------------------------------------
# Secret key for signing JWT tokens (change this to a strong secret in production)
jwt.secret=fixitnow-super-secret-key-change-in-production-must-be-256-bits
# Token expiry: 24 hours in milliseconds
jwt.expiration=86400000

# ------------------------------------------------------------
# Stripe Payment Gateway
# ------------------------------------------------------------
# Replace with your actual Stripe secret key from https://dashboard.stripe.com
stripe.secret-key=sk_test_your_stripe_secret_key

# ------------------------------------------------------------
# Google Maps API (GPS Tracking & ETA)
# ------------------------------------------------------------
# Replace with your actual Google Maps API key
google.maps.api-key=your_google_maps_api_key

# ------------------------------------------------------------
# Email Notifications (Gmail SMTP)
# ------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@fixitnow.com

# ------------------------------------------------------------
# File Upload (for provider verification documents)
# ------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=./uploads

# ------------------------------------------------------------
# Server
# ------------------------------------------------------------
server.port=8081

# ------------------------------------------------------------
# Logging - structured output for monitoring (SRS §2.1.4)
# Application logs: 90 days retention handled by external log aggregator
# ------------------------------------------------------------
logging.level.com.fixitnow=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
